{% extends "base.html" %}

{% block head %}
<style>
    .progress-card {
        max-width: 720px;
        padding: var(--sp-xl);
    }

    .page-header {
        text-align: center;
        margin-bottom: var(--sp-xl);
    }

    .page-header h1 {
        font-size: 1.2rem;
        margin-bottom: var(--sp-sm);
    }

    .global-progress {
        margin-bottom: var(--sp-xl);
    }

    .global-track {
        height: 6px;
        background: var(--surface-raised);
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: var(--sp-sm);
    }

    .global-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent-dim), var(--accent-bright));
        border-radius: 3px;
        transition: width 0.4s ease;
    }

    .global-counter {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.78rem;
        color: var(--text-muted);
        font-family: 'DM Mono', monospace;
    }

    .file-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 440px;
        overflow-y: auto;
        padding-right: 2px;
        margin-bottom: var(--sp-lg);
    }

    .file-row {
        display: flex;
        align-items: center;
        gap: var(--sp-sm);
        padding: 8px var(--sp-md);
        background: var(--surface-raised);
        border: 1px solid var(--surface-border);
        border-radius: var(--radius-md);
        font-size: 0.82rem;
        transition: border-color var(--ease);
        min-width: 0;
    }

    .file-row.status-processing { border-color: var(--accent); }
    .file-row.status-done       { border-color: var(--ok-border); }
    .file-row.status-error      { border-color: var(--err-border); }

    .file-icon {
        width: 20px;
        text-align: center;
        flex-shrink: 0;
        font-size: 0.85rem;
    }

    .file-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-secondary);
        font-family: 'DM Mono', monospace;
        font-size: 0.75rem;
        min-width: 0;
    }

    .file-badge {
        font-size: 0.7rem;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 10px;
        flex-shrink: 0;
        letter-spacing: 0.03em;
    }

    .badge-queued     { background: var(--surface-hover);    color: var(--text-muted); }
    .badge-processing { background: var(--accent-subtle);    color: var(--accent-bright); border: 1px solid var(--accent-glow); }
    .badge-done       { background: var(--ok-bg);            color: var(--ok); border: 1px solid var(--ok-border); }
    .badge-error      { background: var(--err-bg);           color: var(--err); border: 1px solid var(--err-border); }

    .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 1.5px solid var(--accent-glow);
        border-top-color: var(--accent-bright);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-line {
        text-align: center;
        font-size: 0.84rem;
        color: var(--text-muted);
        min-height: 1.4em;
        margin-bottom: var(--sp-lg);
    }

    .action-row {
        display: none;
        gap: var(--sp-md);
        justify-content: center;
        flex-wrap: wrap;
    }

    .action-row.visible { display: flex; }

    .completion-icon {
        display: none;
        font-size: 2rem;
        margin-bottom: var(--sp-sm);
        filter: drop-shadow(0 0 14px rgba(139, 92, 246, 0.5));
    }
    .completion-icon.visible { display: block; }

    .page-wrapper {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: var(--sp-xl) var(--sp-md);
        position: relative;
        z-index: 1;
    }
    .page-wrapper.complete { align-items: center; }

    @media (max-width: 639px) {
        .progress-card { padding: var(--sp-lg) var(--sp-md); }
    }
</style>
{% endblock %}

{% block body %}
<div class="page-wrapper" id="page-wrapper">
<div class="card progress-card">

    <div class="page-header">
        <div class="completion-icon" id="completion-icon">&#x2714;</div>
        <h1 id="page-title">Processing batch&hellip;</h1>
    </div>

    <div class="global-progress">
        <div class="global-track">
            <div class="global-fill" id="global-bar"></div>
        </div>
        <div class="global-counter">
            <span id="global-counter">0 / {{ total }}</span>
            <span id="global-pct">0%</span>
        </div>
    </div>

    <div class="file-list" id="file-list"></div>

    <div class="status-line" id="status-summary">Initialising&hellip;</div>

    <div class="action-row" id="action-area">
        <a id="download-btn" href="#" class="btn btn-primary" style="display:none">Download ZIP</a>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">New upload</a>
    </div>

</div>
</div>

<script>
(function () {
    const jobId   = {{ job_id | tojson }};
    const total   = {{ total }};

    const globalBar      = document.getElementById('global-bar');
    const globalCtr      = document.getElementById('global-counter');
    const globalPct      = document.getElementById('global-pct');
    const fileListEl     = document.getElementById('file-list');
    const statusLine     = document.getElementById('status-summary');
    const actionArea     = document.getElementById('action-area');
    const downloadBtn    = document.getElementById('download-btn');
    const pageTitle      = document.getElementById('page-title');
    const completionIcon = document.getElementById('completion-icon');
    const pageWrapper    = document.getElementById('page-wrapper');

    const ICONS = {
        queued:     '&#x23F3;',
        processing: '<span class="spinner"></span>',
        done:       '&#x2714;',
        error:      '&#x2716;'
    };
    const LABELS = { queued: 'Queued', processing: 'Processing', done: 'Done', error: 'Error' };

    let initialised = false;

    function initRows(files) {
        fileListEl.innerHTML = '';
        files.forEach(f => {
            const row = document.createElement('div');
            row.className = 'file-row status-queued';
            row.id = 'row-' + CSS.escape(f.name);
            row.innerHTML =
                '<div class="file-icon" id="icon-' + CSS.escape(f.name) + '">' + ICONS.queued + '</div>' +
                '<div class="file-name" title="' + f.name + '">' + f.name + '</div>' +
                '<span class="file-badge badge-queued" id="badge-' + CSS.escape(f.name) + '">' + LABELS.queued + '</span>';
            fileListEl.appendChild(row);
        });
    }

    function updateRow(f) {
        const icon  = document.getElementById('icon-'  + CSS.escape(f.name));
        const badge = document.getElementById('badge-' + CSS.escape(f.name));
        const row   = document.getElementById('row-'   + CSS.escape(f.name));
        if (!icon || !badge || !row) return;
        icon.innerHTML    = ICONS[f.status] || ICONS.queued;
        row.className     = 'file-row status-' + f.status;
        badge.className   = 'file-badge badge-' + f.status;
        badge.textContent = f.error ? f.error : (LABELS[f.status] || f.status);
    }

    const evtSource = new EventSource('/job/' + jobId + '/status');

    evtSource.onmessage = function(e) {
        let data;
        try { data = JSON.parse(e.data); } catch(_) { return; }

        if (data.error) { statusLine.textContent = 'Error: ' + data.error; evtSource.close(); return; }

        if (!initialised && data.files && data.files.length) {
            initRows(data.files);
            initialised = true;
        }

        const done = (data.done || 0) + (data.errors || 0);
        const pct  = data.total > 0 ? Math.round(done / data.total * 100) : 0;
        globalBar.style.width = pct + '%';
        globalCtr.textContent = done + ' / ' + data.total;
        globalPct.textContent = pct + '%';

        (data.files || []).forEach(updateRow);

        if (data.complete) {
            evtSource.close();

            completionIcon.classList.add('visible');
            pageWrapper.classList.add('complete');

            if (data.errors === 0) {
                pageTitle.textContent = 'Batch complete';
                statusLine.textContent = 'All ' + data.total + ' files processed successfully.';
            } else if (data.done === 0) {
                pageTitle.textContent = 'Batch failed';
                statusLine.textContent = 'Processing failed for all files.';
            } else {
                pageTitle.textContent = 'Batch complete';
                statusLine.textContent = data.done + ' file(s) done, ' + data.errors + ' error(s).';
            }

            actionArea.classList.add('visible');
            if (data.zip) {
                downloadBtn.href = '/download_batch/' + encodeURIComponent(data.zip);
                downloadBtn.style.display = 'inline-flex';
            }
        } else {
            const processing = (data.files || []).filter(f => f.status === 'processing').length;
            statusLine.textContent = processing > 0
                ? processing + ' file(s) processing\u2026'
                : 'Waiting for workers\u2026';
        }
    };

    evtSource.onerror = function() {
        statusLine.textContent = 'Connection lost. Retrying\u2026';
    };
})();
</script>
{% endblock %}
